spring.application.name=smart-space-backend
spring.threads.virtual.enabled=false
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.health.defaults.enabled=true

# Configurações de Conexão com o PostgreSQL
spring.datasource.url=jdbc:postgresql://smart-space-booking-postgres:5432/smart-space-booking
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
#spring.datasource.url=jdbc:postgresql://localhost:5433/smart-space-booking
#spring.datasource.username=postgres
#spring.datasource.password=123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=create
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Server
server.port=8080
server.servlet.context-path=/api

# CORS
cors.allowed.origins=http://localhost*

# Files
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
file.upload-path=/files

